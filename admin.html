<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        /* ========== جميع أنماط الـ CSS كما هي بدون تغيير ========== */
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --gold: #c9a84c;
            --text: #e0d3b8;
            --border: rgba(201,168,76,0.2);
            --red: #d64545;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        h1, h2, h3 { color: var(--gold); margin-bottom: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        button {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button:hover { filter: brightness(1.2); }
        button.danger { background: var(--red); color: #fff; }
        button.danger:hover { background: #c0392b; }
        button.secondary { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        button.secondary:hover { background: rgba(201,168,76,0.15); }
        button.import-btn { background: #27ae60; color: white; }
        button.import-btn:hover { background: #2ecc71; }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0 12px;
            background: #0d0d0d;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        input[type="file"] { padding: 8px; }

        .lang-tabs { display: flex; gap: 8px; margin: 12px 0; }
        .lang-tabs button {
            background: #2a2a2a; color: #aaa; padding: 8px 16px;
            border-radius: 20px; font-weight: normal; border: none;
        }
        .lang-tabs button.active { background: var(--gold); color: #000; }

        .section-box {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .section-header {
            background: #1e1e1e;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .section-header h3 { margin: 0; font-size: 18px; }
        .product-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap; gap: 10px;
        }
        .product-item:last-child { border-bottom: none; }
        .product-name { font-weight: bold; }
        .product-note { color: #aaa; font-size: 13px; margin-inline-start: 8px; }

        .login-screen {

        .msg.success { color: #2ecc71; }
        .msg.error { color: var(--red); }
        .preview-img { max-width: 120px; max-height: 120px; border-radius: 8px; margin-top: 8px; display: block; }

// ======================= متغيرات عامة =======================
let allCategories = [];
let allProducts = [];

// ======================= تحميل البيانات =======================
async function loadData() {
    const { data: categories } = await supabaseClient.from('categories').select('*');
    allCategories = categories || [];
    const { data: products } = await supabaseClient.from('products').select('*');
    allProducts = products || [];

    // إذا كانت قاعدة البيانات فارغة، اعرض البيانات الافتراضية
    if (allCategories.length === 0) {
        allCategories = defaultData.ar.sections.map(cat => ({
            id: cat.id,
            title_ar: cat.title,
            title_ku: cat.title,
            title_en: cat.title
        }));
    }
    if (allProducts.length === 0) {
        allProducts = [];
        defaultData.ar.sections.forEach(cat => {
            cat.items.forEach(item => {
                allProducts.push({
                    id: null,
                    category_id: cat.id,
                    name_ar: item.name,
                    name_ku: item.name,
                    name_en: item.name,
                    features_ar: item.features,
                    note_ar: item.note,
                    placeholder: item.placeholder,
                    images: item.images || []
                });
            });
        });
    }
}

// ======================= عرض =======================
function populateCategorySelect() {
    const select = document.getElementById('productCategorySelect');
    select.innerHTML = '<option value="">اختر القسم</option>';
    allCategories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.id;
        opt.textContent = cat.title_ar;
        select.appendChild(opt);
    });
}

function renderSections() {
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = '';
    allCategories.forEach(cat => {
        const secDiv = document.createElement('div');
        secDiv.className = 'section-box';
        secDiv.innerHTML = `
            <div class="section-header">
                <h3>${cat.title_ar} (${cat.id})</h3>
                <div>
                    <button class="danger" onclick="deleteCategory('${cat.id}')"><i class="fa-solid fa-trash"></i> حذف القسم</button>
                </div>
            </div>
            <div id="products-${cat.id}"></div>
        `;
        container.appendChild(secDiv);
        renderProducts(cat.id);
    });
}

function renderProducts(categoryId) {
    const container = document.getElementById(`products-${categoryId}`);
    if (!container) return;
    const catProducts = allProducts.filter(p => p.category_id === categoryId);
    container.innerHTML = catProducts.map(p => `
        <div class="product-item">
            <div>
                <span class="product-name">${p.name_ar}</span>
                <span class="product-note">${p.note_ar || ''}</span>
            </div>
            <button class="danger" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i></button>
        </div>
    `).join('');
}

async function addSection() {
    const id = document.getElementById('newSectionId').value.trim();
    const titleAr = document.getElementById('newSectionTitle_ar').value.trim();
    if (!id || !titleAr) return alert('أدخل معرف القسم واسمه بالعربية');
    const titleKu = document.getElementById('newSectionTitle_ku').value.trim() || titleAr;
    const titleEn = document.getElementById('newSectionTitle_en').value.trim() || titleAr;

    const { error } = await supabaseClient.from('categories').insert({
        id, title_ar: titleAr, title_ku: titleKu, title_en: titleEn
    });
    if (error) return alert('خطأ: ' + error.message);

    document.getElementById('newSectionId').value = '';
    document.getElementById('newSectionTitle_ar').value = '';
    document.getElementById('newSectionTitle_ku').value = '';
    document.getElementById('newSectionTitle_en').value = '';
    await refreshAll();
    showMessage('تم إضافة القسم');
}

// ======================= إضافة منتج =======================
async function addNewProduct() {
    const categoryId = document.getElementById('productCategorySelect').value;
    if (!categoryId) return alert('اختر القسم أولاً');

    const nameAr = document.getElementById('productName_ar').value.trim();
    if (!nameAr) return alert('أدخل اسم المنتج بالعربية');
    const nameKu = document.getElementById('productName_ku').value.trim() || nameAr;
    const nameEn = document.getElementById('productName_en').value.trim() || nameAr;

    const featAr = document.getElementById('productFeatures_ar').value.trim();
    const featKu = document.getElementById('productFeatures_ku').value.trim() || featAr;
    const featEn = document.getElementById('productFeatures_en').value.trim() || featAr;

    const noteAr = document.getElementById('productNote_ar').value.trim();
    const noteKu = document.getElementById('productNote_ku').value.trim() || noteAr;
    const noteEn = document.getElementById('productNote_en').value.trim() || noteAr;

    const mainFile = document.getElementById('mainImageFile').files[0];
    let placeholder = '';
    if (mainFile) {
        const mainFileName = `${Date.now()}_${mainFile.name}`;
        const { error: mainError } = await supabaseClient.storage.from('product-images').upload(mainFileName, mainFile);
        if (mainError) return alert('فشل رفع الصورة: ' + mainError.message);
        placeholder = supabaseClient.storage.from('product-images').getPublicUrl(mainFileName).data.publicUrl;
    } else {
        placeholder = 'images/water1.jpg'; // صورة افتراضية
    }

    let images = [];
    const extraFiles = document.getElementById('extraImagesFiles').files;
    for (let i = 0; i < extraFiles.length; i++) {
        const file = extraFiles[i];
        const fileName = `${Date.now()}_${i}_${file.name}`;
        const { error } = await supabaseClient.storage.from('product-images').upload(fileName, file);
        if (!error) {
            const url = supabaseClient.storage.from('product-images').getPublicUrl(fileName).data.publicUrl;
            images.push(url);
        }
    }

    const newProduct = {
        category_id: categoryId,
        name_ar: nameAr, name_ku: nameKu, name_en: nameEn,
        features_ar: featAr, features_ku: featKu, features_en: featEn,
        note_ar: noteAr, note_ku: noteKu, note_en: noteEn,
        placeholder: placeholder,
        images: images
    };

    const { error } = await supabaseClient.from('products').insert(newProduct);
    if (error) return alert('خطأ في الإضافة: ' + error.message);

    document.querySelectorAll('#dashboard input[type=text], #dashboard textarea').forEach(el => el.value = '');
    document.getElementById('mainImageFile').value = '';
    document.getElementById('mainImagePreview').classList.add('hidden');
    document.getElementById('extraImagesFiles').value = '';
    document.getElementById('extraImagesPreview').innerHTML = '';

    await refreshAll();
    showMessage('تم إضافة المنتج');
}

// ======================= حذف =======================
async function deleteProduct(productId) {
    if (!productId) {
        // منتج محلي (غير موجود في Supabase)
        showMessage('هذا المنتج محلي ولا يمكن حذفه من Supabase');
        return;
    }
    if (!confirm('حذف هذا المنتج؟')) return;
    const { error } = await supabaseClient.from('products').delete().eq('id', productId);
    if (error) alert('خطأ: ' + error.message);
    else { await refreshAll(); showMessage('تم الحذف'); }
}

async function deleteCategory(categoryId) {
    if (!confirm('حذف القسم وجميع منتجاته؟')) return;
    await supabaseClient.from('products').delete().eq('category_id', categoryId);
    const { error } = await supabaseClient.from('categories').delete().eq('id', categoryId);
    if (error) alert('خطأ: ' + error.message);
    else { await refreshAll(); showMessage('تم حذف القسم'); }
}

// ======================= تحديث =======================
async function refreshAll() {
    await loadData();
    populateCategorySelect();
    renderSections();
}

// ======================= تسجيل الدخول =======================
async function login() {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        await refreshAll();
    } else {
        document.getElementById('loginError').textContent = 'كلمة المرور غير صحيحة';
    }
}

function logout() {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
}

function showMessage(msg) {
    const box = document.getElementById('messageBox');
    box.textContent = msg;
    box.className = 'msg success';
    setTimeout(() => { box.textContent = ''; box.className = 'msg'; }, 4000);
}

// معاينة الصور
document.getElementById('mainImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('mainImagePreview').src = ev.target.result;
            document.getElementById('mainImagePreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }
});

document.getElementById('extraImagesFiles').addEventListener('change', function(e) {
    const container = document.getElementById('extraImagesPreview');
    container.innerHTML = '';
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'preview-img';
            img.style.width = '80px'; img.style.height = '80px';
            container.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
});

// تبديل التبويبات
document.addEventListener('click', function(e) {
    if (e.target.matches('#sectionLangTabs button, #productLangTabs button')) {
        const parent = e.target.parentElement;
        const lang = e.target.dataset.lang;
        parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.lang-hide').forEach(f => {
            f.style.display = f.dataset.lang === lang ? 'block' : 'none';
        });
    }
});
</script>
