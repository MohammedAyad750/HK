<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز تحكم HK - Supabase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0d0d0d; --surface: #1a1a1a; --gold: #c9a84c; --text: #e0d3b8;
            --border: rgba(201,168,76,0.2); --red: #d64545;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: var(--surface); border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        h1, h2, h3 { color: var(--gold); margin-bottom: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        button { background: var(--gold); color: #000; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        button:hover { filter: brightness(1.2); }
        button.danger { background: var(--red); color: #fff; }
        button.danger:hover { background: #c0392b; }
        button.secondary { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        button.secondary:hover { background: rgba(201,168,76,0.15); }
        input, textarea, select { width: 100%; padding: 10px 14px; margin: 6px 0 12px; background: #0d0d0d; border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        .lang-tabs { display: flex; gap: 8px; margin: 12px 0; }
        .lang-tabs button { background: #2a2a2a; color: #aaa; padding: 8px 16px; border-radius: 20px; font-weight: normal; border: none; }
        .lang-tabs button.active { background: var(--gold); color: #000; }
        .section-box { background: #111; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
        .section-header { background: #1e1e1e; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-bottom: 1px solid var(--border); }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 10px; }
        .product-item:last-child { border-bottom: none; }
        .product-name { font-weight: bold; }
        .product-note { color: #aaa; font-size: 13px; margin-inline-start: 8px; }
        .login-screen { max-width: 400px; margin: 80px auto; text-align: center; }
        .hidden { display: none !important; }
        .msg { margin: 10px 0; font-weight: bold; }
        .msg.success { color: #2ecc71; }
        .msg.error { color: var(--red); }
        .preview-img { max-width: 120px; max-height: 120px; border-radius: 8px; margin-top: 8px; display: block; }
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen card">
    <h1><i class="fa-solid fa-lock"></i> دخول المدير</h1>
    <input type="password" id="passwordInput" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p id="loginError" class="msg error"></p>
</div>

<div id="dashboard" class="container hidden">
    <div class="flex-between" style="margin-bottom:20px;">
        <h1>لوحة تحكم HK</h1>
        <button class="secondary" onclick="logout()">تسجيل الخروج</button>
    </div>
    <div id="messageBox" class="msg success"></div>

    <!-- إضافة قسم -->
    <div class="card">
        <h2>إضافة قسم جديد</h2>
        <input type="text" id="newSectionId" placeholder="معرّف القسم (مثلاً: turkish)">
        <div class="lang-tabs" id="sectionLangTabs">
            <button class="active" data-lang="ar">العربية</button>
            <button data-lang="ku">کوردی</button>
            <button data-lang="en">English</button>
        </div>
        <input type="text" id="newSectionTitle_ar" placeholder="اسم القسم (عربي)">
        <input type="text" id="newSectionTitle_ku" class="lang-hide" data-lang="ku" placeholder="اسم القسم (کوردی)" style="display:none;">
        <input type="text" id="newSectionTitle_en" class="lang-hide" data-lang="en" placeholder="اسم القسم (English)" style="display:none;">
        <button onclick="addSection()"><i class="fa-solid fa-plus"></i> إضافة القسم</button>
    </div>

    <!-- إضافة منتج -->
    <div class="card">
        <h2>إضافة منتج جديد</h2>
        <select id="productCategorySelect"></select>
        <div class="lang-tabs" id="productLangTabs">
            <button class="active" data-lang="ar">العربية</button>
            <button data-lang="ku">کوردی</button>
            <button data-lang="en">English</button>
        </div>
        <input type="text" id="productName_ar" placeholder="اسم المنتج (عربي)">
        <input type="text" id="productName_ku" class="lang-hide" data-lang="ku" placeholder="اسم المنتج (کوردی)" style="display:none;">
        <input type="text" id="productName_en" class="lang-hide" data-lang="en" placeholder="Product Name" style="display:none;">
        <textarea id="productFeatures_ar" placeholder="الميزات (عربي)"></textarea>
        <textarea id="productFeatures_ku" class="lang-hide" data-lang="ku" placeholder="الميزات (کوردی)" style="display:none;"></textarea>
        <textarea id="productFeatures_en" class="lang-hide" data-lang="en" placeholder="Features" style="display:none;"></textarea>
        <input type="text" id="productNote_ar" placeholder="ملاحظة السعر (عربي)">
        <input type="text" id="productNote_ku" class="lang-hide" data-lang="ku" placeholder="نرخ (کوردی)" style="display:none;">
        <input type="text" id="productNote_en" class="lang-hide" data-lang="en" placeholder="Price note" style="display:none;">
        <label>الصورة الرئيسية:</label>
        <input type="file" id="mainImageFile" accept="image/*">
        <img id="mainImagePreview" class="preview-img hidden" alt="معاينة">
        <label>صور إضافية:</label>
        <input type="file" id="extraImagesFiles" accept="image/*" multiple>
        <div id="extraImagesPreview" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;"></div>
        <button onclick="addNewProduct()"><i class="fa-solid fa-plus"></i> إضافة المنتج</button>
    </div>

    <div id="sectionsContainer"></div>

    <button onclick="refreshAll()" style="width:100%; margin-top:10px; padding:14px;">
        <i class="fa-solid fa-arrows-rotate"></i> تحديث القائمة
    </button>
    <p style="text-align:center; color:#777; margin-top:8px;">يتم حفظ التغييرات تلقائياً في قاعدة البيانات.</p>
</div>

<script>
// ======================= إعدادات Supabase =======================
const supabaseUrl = 'https://lkfmttbrnkmylhidcqdl.supabase.co';
const supabaseAnonKey = 'sb_publishable_Kfpp1ztrWmCO27tuRfS9sg_f8xBCOEL';
const { createClient } = supabase;
const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);

const ADMIN_PASSWORD = "admin123";
let allCategories = [];
let allProducts = [];

// ======================= تحميل البيانات =======================
async function loadData() {
    const { data: categories, error: catErr } = await supabaseClient.from('categories').select('*');
    if (catErr) {
        showMessage('خطأ في تحميل الأقسام: ' + catErr.message, 'error');
        return;
    }
    allCategories = categories || [];

    const { data: products, error: prodErr } = await supabaseClient.from('products').select('*');
    if (prodErr) {
        showMessage('خطأ في تحميل المنتجات: ' + prodErr.message, 'error');
        return;
    }
    allProducts = products || [];
}

// ======================= عرض =======================
function populateCategorySelect() {
    const select = document.getElementById('productCategorySelect');
    select.innerHTML = '<option value="">اختر القسم</option>';
    allCategories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.id;
        opt.textContent = cat.title_ar;
        select.appendChild(opt);
    });
}

function renderSections() {
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = '';
    allCategories.forEach(cat => {
        const secDiv = document.createElement('div');
        secDiv.className = 'section-box';
        secDiv.innerHTML = `
            <div class="section-header">
                <h3>${cat.title_ar} (${cat.id})</h3>
                <button class="danger" onclick="deleteCategory('${cat.id}')"><i class="fa-solid fa-trash"></i> حذف القسم</button>
            </div>
            <div id="products-${cat.id}"></div>
        `;
        container.appendChild(secDiv);
        renderProducts(cat.id);
    });
}

function renderProducts(categoryId) {
    const container = document.getElementById(`products-${categoryId}`);
    if (!container) return;
    const catProducts = allProducts.filter(p => p.category_id === categoryId);
    container.innerHTML = catProducts.map(p => `
        <div class="product-item">
            <div>
                <span class="product-name">${p.name_ar}</span>
                <span class="product-note">${p.note_ar || ''}</span>
            </div>
            <button class="danger" onclick="deleteProduct(${p.id})"><i class="fa-solid fa-trash"></i></button>
        </div>
    `).join('');
}

// ======================= إضافة قسم =======================
async function addSection() {
    const id = document.getElementById('newSectionId').value.trim();
    const titleAr = document.getElementById('newSectionTitle_ar').value.trim();
    if (!id || !titleAr) return alert('أدخل معرف القسم واسمه');
    const titleKu = document.getElementById('newSectionTitle_ku').value.trim() || titleAr;
    const titleEn = document.getElementById('newSectionTitle_en').value.trim() || titleAr;

    const { error } = await supabaseClient.from('categories').insert({ id, title_ar: titleAr, title_ku: titleKu, title_en: titleEn });
    if (error) return showMessage('خطأ: ' + error.message, 'error');

    ['newSectionId','newSectionTitle_ar','newSectionTitle_ku','newSectionTitle_en'].forEach(f => document.getElementById(f).value = '');
    await refreshAll();
    showMessage('تم إضافة القسم');
}

// ======================= إضافة منتج مع رفع الصور =======================
async function addNewProduct() {
    const categoryId = document.getElementById('productCategorySelect').value;
    if (!categoryId) return alert('اختر القسم');

    const nameAr = document.getElementById('productName_ar').value.trim();
    if (!nameAr) return alert('أدخل اسم المنتج');

    const mainFile = document.getElementById('mainImageFile').files[0];
    if (!mainFile) return alert('اختر صورة رئيسية');

    // التأكد من وجود bucket الصور (اختياري)
    const { data: buckets } = await supabaseClient.storage.listBuckets();
    if (!buckets || !buckets.find(b => b.name === 'product-images')) {
        return showMessage('الرجاء إنشاء bucket باسم product-images في Supabase Storage', 'error');
    }

    // رفع الصورة الرئيسية
    const mainFileName = Date.now() + '_' + mainFile.name;
    const { error: mainError } = await supabaseClient.storage.from('product-images').upload(mainFileName, mainFile);
    if (mainError) return showMessage('فشل رفع الصورة: ' + mainError.message, 'error');
    const placeholder = supabaseClient.storage.from('product-images').getPublicUrl(mainFileName).data.publicUrl;

    // رفع الصور الإضافية
    let images = [];
    const extraFiles = document.getElementById('extraImagesFiles').files;
    for (let i = 0; i < extraFiles.length; i++) {
        const file = extraFiles[i];
        const fileName = Date.now() + '_' + i + '_' + file.name;
        const { error } = await supabaseClient.storage.from('product-images').upload(fileName, file);
        if (!error) {
            const url = supabaseClient.storage.from('product-images').getPublicUrl(fileName).data.publicUrl;
            images.push(url);
        }
    }

    const newProduct = {
        category_id: categoryId,
        name_ar: nameAr,
        name_ku: document.getElementById('productName_ku').value.trim() || nameAr,
        name_en: document.getElementById('productName_en').value.trim() || nameAr,
        features_ar: document.getElementById('productFeatures_ar').value.trim(),
        features_ku: document.getElementById('productFeatures_ku').value.trim(),
        features_en: document.getElementById('productFeatures_en').value.trim(),
        note_ar: document.getElementById('productNote_ar').value.trim(),
        note_ku: document.getElementById('productNote_ku').value.trim(),
        note_en: document.getElementById('productNote_en').value.trim(),
        placeholder: placeholder,
        images: images
    };

    const { error } = await supabaseClient.from('products').insert(newProduct);
    if (error) return showMessage('خطأ: ' + error.message, 'error');

    // مسح الحقول
    document.querySelectorAll('#dashboard input[type=text], #dashboard textarea').forEach(el => el.value = '');
    document.getElementById('mainImageFile').value = '';
    document.getElementById('mainImagePreview').classList.add('hidden');
    document.getElementById('extraImagesFiles').value = '';
    document.getElementById('extraImagesPreview').innerHTML = '';
    await refreshAll();
    showMessage('تم إضافة المنتج');
}

// ======================= حذف =======================
async function deleteProduct(id) {
    if (!confirm('حذف المنتج؟')) return;
    const { error } = await supabaseClient.from('products').delete().eq('id', id);
    if (error) showMessage(error.message, 'error');
    else { await refreshAll(); showMessage('تم الحذف'); }
}

async function deleteCategory(id) {
    if (!confirm('حذف القسم وجميع منتجاته؟')) return;
    await supabaseClient.from('products').delete().eq('category_id', id);
    const { error } = await supabaseClient.from('categories').delete().eq('id', id);
    if (error) showMessage(error.message, 'error');
    else { await refreshAll(); showMessage('تم حذف القسم'); }
}

async function refreshAll() {
    await loadData();
    populateCategorySelect();
    renderSections();
}

// ======================= تسجيل الدخول =======================
async function login() {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        await refreshAll();
    } else {
        document.getElementById('loginError').textContent = 'كلمة المرور غير صحيحة';
    }
}
function logout() {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
}
function showMessage(msg, type = 'success') {
    const box = document.getElementById('messageBox');
    box.textContent = msg;
    box.className = 'msg ' + type;
    setTimeout(() => { box.textContent = ''; box.className = 'msg'; }, 5000);
}

// ======================= معاينة الصور =======================
document.getElementById('mainImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('mainImagePreview').src = ev.target.result;
            document.getElementById('mainImagePreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }
});
document.getElementById('extraImagesFiles').addEventListener('change', function(e) {
    const container = document.getElementById('extraImagesPreview');
    container.innerHTML = '';
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.className = 'preview-img';
            img.style.width = '80px'; img.style.height = '80px';
            container.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
});

// تبديل التبويبات
document.addEventListener('click', function(e) {
    if (e.target.matches('#sectionLangTabs button, #productLangTabs button')) {
        const parent = e.target.parentElement;
        const lang = e.target.dataset.lang;
        parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.lang-hide').forEach(f => {
            f.style.display = f.dataset.lang === lang ? 'block' : 'none';
        });
    }
});
</script>
</body>
</html>
