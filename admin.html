<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز تحكم HK - رفع صور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --gold: #c9a84c;
            --text: #e0d3b8;
            --border: rgba(201,168,76,0.2);
            --red: #d64545;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            direction: rtl;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        h1, h2, h3 { color: var(--gold); margin-bottom: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        button {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button:hover { filter: brightness(1.2); }
        button.danger { background: var(--red); color: #fff; }
        button.danger:hover { background: #c0392b; }
        button.secondary { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        button.secondary:hover { background: rgba(201,168,76,0.15); }

        input, textarea, select {
            width: 100%;
            padding: 10px 14px;
            margin: 6px 0 12px;
            background: #0d0d0d;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        input[type="file"] { padding: 8px; }

        .lang-tabs { display: flex; gap: 8px; margin: 12px 0; }
        .lang-tabs button {
            background: #2a2a2a; color: #aaa; padding: 8px 16px;
            border-radius: 20px; font-weight: normal; border: none;
        }
        .lang-tabs button.active { background: var(--gold); color: #000; }

        .section-box {
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .section-header {
            background: #1e1e1e;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .section-header h3 { margin: 0; font-size: 18px; }
        .product-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap; gap: 10px;
        }
        .product-item:last-child { border-bottom: none; }
        .product-name { font-weight: bold; }
        .product-note { color: #aaa; font-size: 13px; margin-inline-start: 8px; }

        .login-screen {
            max-width: 400px; margin: 80px auto;
            text-align: center;
        }
        .hidden { display: none !important; }
        .msg { margin: 10px 0; font-weight: bold; }
        .msg.success { color: #2ecc71; }
        .msg.error { color: var(--red); }
        .preview-img { max-width: 120px; max-height: 120px; border-radius: 8px; margin-top: 8px; display: block; }
    </style>
</head>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen card">
    <h1><i class="fa-solid fa-lock"></i> دخول المدير</h1>
    <input type="password" id="passwordInput" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p id="loginError" class="msg error"></p>
</div>

<!-- لوحة التحكم الرئيسية -->
<div id="dashboard" class="container hidden">
    <div class="flex-between" style="margin-bottom:20px;">
        <h1 style="margin:0;">لوحة تحكم HK</h1>
        <button class="secondary" onclick="logout()">تسجيل الخروج</button>
    </div>

    <div id="messageBox" class="msg success"></div>

    <!-- ====== إضافة قسم جديد ====== -->
    <div class="card">
        <h2>إضافة قسم جديد</h2>
        <input type="text" id="newSectionId" placeholder="معرّف القسم (مثلاً: turkish)">
        <div class="lang-tabs" id="sectionLangTabs">
            <button class="active" data-lang="ar">العربية</button>
            <button data-lang="ku">کوردی</button>
            <button data-lang="en">English</button>
        </div>
        <input type="text" id="newSectionTitle_ar" placeholder="اسم القسم (عربي)">
        <input type="text" id="newSectionTitle_ku" class="lang-hide" data-lang="ku" placeholder="اسم القسم (کوردی)" style="display:none;">
        <input type="text" id="newSectionTitle_en" class="lang-hide" data-lang="en" placeholder="اسم القسم (English)" style="display:none;">
        <button onclick="addSection()"><i class="fa-solid fa-plus"></i> إضافة القسم</button>
    </div>

    <!-- إضافة منتج جديد -->
    <div class="card">
        <h2>إضافة منتج جديد</h2>
        <select id="productCategorySelect"></select>

        <div class="lang-tabs" id="productLangTabs">
            <button class="active" data-lang="ar">العربية</button>
            <button data-lang="ku">کوردی</button>
            <button data-lang="en">English</button>
        </div>

        <input type="text" id="productName_ar" placeholder="اسم المنتج (عربي)">
        <input type="text" id="productName_ku" class="lang-hide" data-lang="ku" placeholder="اسم المنتج (کوردی)" style="display:none;">
        <input type="text" id="productName_en" class="lang-hide" data-lang="en" placeholder="اسم المنتج (English)" style="display:none;">

        <textarea id="productFeatures_ar" placeholder="الميزات (عربي)"></textarea>
        <textarea id="productFeatures_ku" class="lang-hide" data-lang="ku" placeholder="الميزات (کوردی)" style="display:none;"></textarea>
        <textarea id="productFeatures_en" class="lang-hide" data-lang="en" placeholder="Features (English)" style="display:none;"></textarea>

        <input type="text" id="productNote_ar" placeholder="ملاحظة السعر (عربي)">
        <input type="text" id="productNote_ku" class="lang-hide" data-lang="ku" placeholder="نرخ (کوردی)" style="display:none;">
        <input type="text" id="productNote_en" class="lang-hide" data-lang="en" placeholder="Price note (English)" style="display:none;">

        <!-- رفع الصورة الرئيسية -->
        <label>الصورة الرئيسية:</label>
        <input type="file" id="mainImageFile" accept="image/*">
        <img id="mainImagePreview" class="preview-img hidden" alt="معاينة">

        <!-- رفع صور إضافية -->
        <label>صور إضافية (اختياري):</label>
        <input type="file" id="extraImagesFiles" accept="image/*" multiple>
        <div id="extraImagesPreview" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;"></div>

        <button onclick="addNewProduct()"><i class="fa-solid fa-plus"></i> إضافة المنتج</button>
    </div>

    <!-- عرض الأقسام والمنتجات -->
    <div id="sectionsContainer"></div>

    <!-- زر الحفظ -->
    <button onclick="saveAll()" style="width:100%; margin-top:10px; padding:14px;">
        <i class="fa-solid fa-floppy-disk"></i> حفظ جميع التغييرات
    </button>
    <p style="text-align:center; color:#777; margin-top:8px;">سيتم تطبيق التغييرات على موقع العميل بعد الحفظ.</p>
</div>

// ======================= منطق لوحة التحكم =======================
const ADMIN_PASSWORD = "admin123";
const STORAGE_KEY = "hk_perfume_data";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || JSON.parse(JSON.stringify(defaultData));

['ar','ku','en'].forEach(lang => {
    if (!data[lang]) data[lang] = JSON.parse(JSON.stringify(defaultData[lang]));
    if (!data[lang].sections) data[lang].sections = [];
});

// ========== تحويل ملف إلى Base64 ==========
function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// ========== إضافة منتج جديد مع رفع الصور ==========
async function addNewProduct() {
    const sectionIndex = document.getElementById('productCategorySelect').value;
    if (sectionIndex === '') return alert('اختر القسم أولاً');

    const nameAr = document.getElementById('productName_ar').value.trim();
    if (!nameAr) return alert('أدخل اسم المنتج بالعربية');
    const nameKu = document.getElementById('productName_ku').value.trim() || nameAr;
    const nameEn = document.getElementById('productName_en').value.trim() || nameAr;

    const featAr = document.getElementById('productFeatures_ar').value.trim();
    const featKu = document.getElementById('productFeatures_ku').value.trim() || featAr;
    const featEn = document.getElementById('productFeatures_en').value.trim() || featAr;

    const noteAr = document.getElementById('productNote_ar').value.trim();
    const noteKu = document.getElementById('productNote_ku').value.trim() || noteAr;
    const noteEn = document.getElementById('productNote_en').value.trim() || noteAr;

    const mainImgFile = document.getElementById('mainImageFile').files[0];
    if (!mainImgFile) return alert('اختر صورة رئيسية للمنتج');
    const placeholder = await fileToBase64(mainImgFile);

    const extraFiles = document.getElementById('extraImagesFiles').files;
    let images = [];
    for (let i = 0; i < extraFiles.length; i++) {
        const base64 = await fileToBase64(extraFiles[i]);
        images.push(base64);
    }

    const newItemAr = { name: nameAr, features: featAr, note: noteAr, placeholder: placeholder };
    const newItemKu = { name: nameKu, features: featKu, note: noteKu, placeholder: placeholder };
    const newItemEn = { name: nameEn, features: featEn, note: noteEn, placeholder: placeholder };

    if (images.length > 0) {
        newItemAr.images = images;
        newItemKu.images = images;
        newItemEn.images = images;
    }

    data.ar.sections[sectionIndex].items.push(newItemAr);
    data.ku.sections[sectionIndex].items.push(newItemKu);
    data.en.sections[sectionIndex].items.push(newItemEn);

    // مسح الحقول
    document.querySelectorAll('#dashboard input[type=text], #dashboard textarea').forEach(el => el.value = '');
    document.getElementById('mainImageFile').value = '';
    document.getElementById('mainImagePreview').classList.add('hidden');
    document.getElementById('extraImagesFiles').value = '';
    document.getElementById('extraImagesPreview').innerHTML = '';

    renderAll();
    showMessage('تمت إضافة المنتج (لم تحفظ بعد)', 'success');
}

// ========== دوال العرض والحذف والحفظ ==========
function login() {
    if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        populateCategorySelect();
        renderAll();
    } else {
        document.getElementById('loginError').textContent = 'كلمة المرور غير صحيحة';
    }
}

function logout() {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
}

function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showMessage('تم حفظ البيانات بنجاح', 'success');
}

function showMessage(msg, type) {
    const box = document.getElementById('messageBox');
    box.textContent = msg;
    box.className = 'msg ' + (type || 'success');
    setTimeout(() => { box.textContent = ''; box.className = 'msg'; }, 4000);
}

function populateCategorySelect() {
    const select = document.getElementById('productCategorySelect');
    select.innerHTML = '<option value="">اختر القسم</option>';
    data.ar.sections.forEach((sec, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = sec.title;
        select.appendChild(opt);
    });
}

function renderAll() {
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = '';
    data.ar.sections.forEach((sec, idx) => {
        const secDiv = document.createElement('div');
        secDiv.className = 'section-box';
        secDiv.innerHTML = `
            <div class="section-header">
                <h3>${sec.title} <small style="color:#aaa; font-size:13px;">(${sec.id})</small></h3>
                <div>
                    <button onclick="showAddProduct(${idx})"><i class="fa-solid fa-plus"></i> منتج جديد</button>
                    <button class="danger" onclick="deleteSection(${idx})"><i class="fa-solid fa-trash"></i> حذف القسم</button>
                </div>
            </div>
            <div id="products-${idx}"></div>
        `;
        container.appendChild(secDiv);
        renderProducts(idx);
    });
}

function renderProducts(secIdx) {
    const section = data.ar.sections[secIdx];
    const container = document.getElementById(`products-${secIdx}`);
    container.innerHTML = '';
    section.items.forEach((item, itemIdx) => {
        const div = document.createElement('div');
        div.className = 'product-item';
        div.innerHTML = `
            <div>
                <span class="product-name">${item.name}</span>
                <span class="product-note">${item.note || ''}</span>
            </div>
            <button class="danger" onclick="deleteProduct(${secIdx}, ${itemIdx})"><i class="fa-solid fa-trash"></i></button>
        `;
        container.appendChild(div);
    });
}

function showAddProduct(secIdx) {
    document.getElementById('productCategorySelect').value = secIdx;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteProduct(secIdx, itemIdx) {
    if (confirm('حذف هذا المنتج؟')) {
        data.ar.sections[secIdx].items.splice(itemIdx, 1);
        data.ku.sections[secIdx].items.splice(itemIdx, 1);
        data.en.sections[secIdx].items.splice(itemIdx, 1);
        renderAll();
        showMessage('تم الحذف (احفظ التغييرات)', 'success');
    }
}

function addSection() {
    const id = document.getElementById('newSectionId').value.trim();
    if (!id) return alert('أدخل معرف القسم');
    const titleAr = document.getElementById('newSectionTitle_ar').value.trim();
    const titleKu = document.getElementById('newSectionTitle_ku').value.trim() || titleAr;
    const titleEn = document.getElementById('newSectionTitle_en').value.trim() || titleAr;

    data.ar.sections.push({ id, title: titleAr, items: [] });
    data.ku.sections.push({ id, title: titleKu, items: [] });
    data.en.sections.push({ id, title: titleEn, items: [] });

    ['newSectionId','newSectionTitle_ar','newSectionTitle_ku','newSectionTitle_en'].forEach(id => document.getElementById(id).value = '');
    renderAll();
    showMessage('تم إضافة القسم (احفظ التغييرات)', 'success');
}

function deleteSection(secIdx) {
    if (confirm('حذف القسم وجميع منتجاته؟')) {
        data.ar.sections.splice(secIdx, 1);
        data.ku.sections.splice(secIdx, 1);
        data.en.sections.splice(secIdx, 1);
        renderAll();
        showMessage('تم حذف القسم (احفظ)', 'success');
    }
}

// معاينة الصورة الرئيسية عند الاختيار
document.getElementById('mainImageFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        fileToBase64(file).then(base64 => {
            document.getElementById('mainImagePreview').src = base64;
            document.getElementById('mainImagePreview').classList.remove('hidden');
        });
    }
});

// معاينة الصور الإضافية
document.getElementById('extraImagesFiles').addEventListener('change', function(e) {
    const container = document.getElementById('extraImagesPreview');
    container.innerHTML = '';
    Array.from(e.target.files).forEach(file => {
        fileToBase64(file).then(base64 => {
            const img = document.createElement('img');
            img.src = base64;
            img.className = 'preview-img';
            img.style.width = '80px';
            img.style.height = '80px';
            container.appendChild(img);
        });
    });
});

// تبديل تبويبات اللغة
document.addEventListener('click', function(e) {
    if (e.target.matches('#sectionLangTabs button')) {
        const lang = e.target.dataset.lang;
        document.querySelectorAll('#sectionLangTabs button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.lang-hide').forEach(f => {
            f.style.display = f.dataset.lang === lang ? 'block' : 'none';
        });
    }
    if (e.target.matches('#productLangTabs button')) {
        const lang = e.target.dataset.lang;
        document.querySelectorAll('#productLangTabs button').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('#dashboard .lang-hide').forEach(f => {
            f.style.display = f.dataset.lang === lang ? 'block' : 'none';
        });
    }
});
</script>
</body>
</html>
